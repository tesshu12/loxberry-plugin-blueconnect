# LoxBerry auto-update release descriptor for the BlueConnect plugin.
# LoxBerry checks this file (referenced by RELEASECFG in plugin.cfg) and, when
# VERSION here is newer than the installed plugin, downloads and installs
# the archive from ARCHIVEURL.

# Latest stable plugin version.
VERSION=1.0.1

# Download URL of the plugin archive for this version.
# GitHub serves this automatically for the matching git tag (v1.0.1).
ARCHIVEURL=https://github.com/tesshu12/loxberry-plugin-blueconnect/archive/refs/tags/v1.0.1.zip

# Human-readable release notes / changelog.
INFOURL=https://github.com/tesshu12/loxberry-plugin-blueconnect/releases
