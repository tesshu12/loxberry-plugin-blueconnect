[blueconnect]
username=
# The password is encrypted automatically on the first save:
# the plaintext is stored here temporarily and immediately replaced by password_enc.
password_plain=
password_enc=
# Filled automatically by the script.
pool_id=
pool_name=
blue_serial=

[loxone]
# Miniserver IP is pulled automatically from LoxBerry system settings.
# miniserver_nr selects which Miniserver (empty = first). Only the UDP port
# (Loxone Virtual UDP Input) is configured here.
miniserver_nr=
miniserver_port=7777

[polling]
interval=300

[data]
cache_file=/tmp/blueconnect_pool.json
